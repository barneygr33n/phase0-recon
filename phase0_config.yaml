# Phase 0 recon logger config
# Discovery works off Kalshi's EVENTS feed (which excludes the ~60k auto-generated
# multivariate/combo markets) and assigns families by CATEGORY and, within the
# Entertainment category, by SERIES PREFIX. Verified against live listings 2026-07-12.

runtime:
  db_path: "phase0_recon.db"
  ws_url: "wss://api.elections.kalshi.com/trade-api/ws/v2"
  rest_base: "https://api.elections.kalshi.com/trade-api/v2"
  ws_sign_path: "/trade-api/ws/v2"
  max_markets: 40             # cap concurrent orderbook subscriptions (§1)
  rt_cap: 15                  # always keep up to this many Rotten Tomatoes markets (priority)
  max_events_per_family: 25   # cap events resolved per family before market lookup
  rediscover_every_min: 60    # re-scan open events this often (adds/removes)
  commit_every_s: 5
  coverage_ping_s: 300
  low_vol_sample: 5
  per_family_cap: 12
  new_launch_days: 14
  include_new_launch: false

# Families (refined with Ben, 2026-07-12). Weather intentionally excluded.
#  - `categories`: match the whole Kalshi category (used for Mentions).
#  - `entertainment_series_prefixes`: match series by prefix ONLY within the
#     "Entertainment" category (keeps economics/sports lookalikes out).
families:
  rotten_tomatoes:                       # PRIORITY — laddered movie-score buckets
    entertainment_series_prefixes: ["KXRT"]
  awards:                                # culture/awards shows (Oscar/Emmy/Grammy/…)
    entertainment_series_prefixes:
      ["KXOSCAR", "KXEMMY", "KXGRAM", "KXTONY", "KXGAMEAWARD", "KXESPY",
       "KXSAG", "KXGLOBE", "KXGOLDENGLOBE", "KXBAFTA", "KXCRITICS", "KXNAACP"]
  mention:                               # entire "Mentions" category
    categories: ["Mentions"]
